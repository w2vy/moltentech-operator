name: CI

# Typecheck + test every package, and smoke-test the mt-manifest CLI the way an
# operator actually invokes it. The smoke test exists because the CLI is shipped as a
# published image (see publish-mt-manifest.yml): a change that breaks the documented
# config.env contract is invisible to unit tests but breaks a signing ceremony.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      # Full history, not just the diff: a secret committed once stays exposed even if a
      # later commit removes it, and this repo is a candidate to be made public (its
      # audience is third-party operators). Config + rationale in .gitleaks.toml.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --config /repo/.gitleaks.toml \
            --no-banner --redact --verbose

  package:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [protocol, agent, coalition]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            protocol/package-lock.json
            ${{ matrix.package }}/package-lock.json

      # agent + coalition depend on protocol via `file:../protocol`, and protocol's
      # exports point at src/*.ts — so tsc typechecks protocol's SOURCES through the
      # symlink and needs protocol's OWN dependencies (zod, @noble/*) on disk. Each
      # matrix job is a fresh runner, so install them explicitly; without this,
      # agent/coalition fail with "Cannot find module 'zod'" from ../protocol.
      - name: Install protocol deps
        if: matrix.package != 'protocol'
        working-directory: protocol
        run: npm ci --no-audit --no-fund

      - name: Install
        working-directory: ${{ matrix.package }}
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: ${{ matrix.package }}
        run: npm run typecheck

      - name: Test
        working-directory: ${{ matrix.package }}
        run: npm test

  mt-manifest-smoke:
    name: mt-manifest CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the operator-facing image
        run: docker build -f protocol/Dockerfile -t mt-manifest:ci protocol

      # Exercise the documented operator flow end-to-end against a sample config.env.
      # Keep this config in sync with docs/operator-onboarding.md — if the contract
      # changes, this fails here rather than mid-ceremony on someone's signing machine.
      # Drive the flow using the ONBOARDING DOC'S OWN config.env, not a copy. A copy
      # drifts silently: the doc once carried a nimbus price of 20000 cents ($200
      # against a $20 floor) that this job would have happily signed, because it was
      # validating its own sample instead. Now the doc IS the fixture — if the
      # documented config stops working, or its prices stop clearing the platform
      # floor, this fails.
      - name: Sign + verify using the onboarding doc's own config.env
        run: |
          set -euo pipefail
          work="$(mktemp -d)"

          python3 - "$work" <<'EXTRACT'
          import re, sys, pathlib
          work = pathlib.Path(sys.argv[1])
          doc = pathlib.Path("docs/operator-onboarding.md").read_text()
          blocks = re.findall(r"```(?:sh|bash|env)?\n(.*?)```", doc, re.S)

          cfg = [b for b in blocks if "PROVIDER_SLUG=" in b and "COALITION_URL=" in b]
          sec = [b for b in blocks if "STRIPE_SECRET_KEY=" in b and "AGENT_KEY=" in b]
          if not cfg or not sec:
              sys.exit("FAIL: could not find the config.env / secrets.env blocks in "
                       "docs/operator-onboarding.md — did the doc's structure change?")

          # Substitute ONLY the <angle-bracket> placeholders. Everything else — key
          # names, values, prices — is used exactly as an operator would copy it.
          c = cfg[0].replace("https://<your-coalition>", "https://coalition.example")
          c = c.replace("<your owner ZelID>", "t1exampleOwnerWalletAddress")
          (work / "config.env").write_text(c)
          (work / "secrets.env").write_text(re.sub(r"<[^>\n]*>", "ci-dummy", sec[0]))
          print("extracted config.env + secrets.env from the onboarding doc")
          EXTRACT

          run() { docker run --rm -v "$work:/work" -u "$(id -u):$(id -g)" mt-manifest:ci "$@"; }
          run keygen
          run sign --key manifest-key.pem --from-config config.env --out manifest.json
          run verify --in manifest.json
          run env --from-config config.env --secrets secrets.env \
                  --manifest manifest.json --out env.json

          python3 - "$work" <<'ASSERT'
          import json, sys, pathlib
          work = pathlib.Path(sys.argv[1])

          m = json.load(open(work / "manifest.json"))
          assert "tiers" not in m, "retired `tiers` field is back in the manifest"
          assert m["schemaVersion"] == 2, f"unexpected schemaVersion: {m['schemaVersion']}"
          assert m["hardware"], "manifest carries no hardware[]"
          print("manifest OK:", [h["name"] for h in m["hardware"]])

          pairs = dict(p.split("=", 1) for p in json.load(open(work / "env.json")))
          prices = json.loads(pairs["TIER_PRICES_JSON"])

          # Platform price floors, in CENTS. These MIRROR apps/web/src/lib/tiers.ts in
          # the web repo (which this repo cannot import) — keep them in sync; MT rejects
          # a listing below floor with a 422. This is the assertion that would have
          # caught the doc's $200 nimbus.
          FLOORS = {"cumulus": 700, "nimbus": 2000, "stratus": 4000}
          for tier, cents in prices.items():
              floor = FLOORS.get(tier)
              assert floor is not None, f"unknown tier in the doc's TIER_PRICES_JSON: {tier}"
              assert isinstance(cents, int), f"{tier}: price must be integer cents, got {cents!r}"
              assert cents >= floor, (
                  f"{tier}: the doc's price {cents} cents is BELOW the platform floor {floor}"
              )
              # A price wildly above floor is usually a misplaced zero, not a decision.
              assert cents <= floor * 5, (
                  f"{tier}: the doc's price {cents} cents is more than 5x the {floor} floor "
                  f"— check for an extra zero (20000 vs 2000)"
              )
          print("TIER_PRICES_JSON OK (all tiers clear the floor, none suspiciously high):", prices)
          ASSERT

      - name: Reject a malformed config.env
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          # A trailing `;` (or any stray text) must fail loudly — the config parser takes
          # everything after `=` verbatim, so this class of typo has bitten a real ceremony.
          cat > "$work/config.env" <<'EOF'
          PROVIDER_SLUG=ci-operator
          PROVIDER_NAME=CI Operator
          MT_BASE_URL=https://www.moltentech.us
          COALITION_URL=https://coalition.example
          HOSTS=pve-01
          TIER_PRICES_JSON={"cumulus":700};
          TRIAL_DAYS=1
          EOF
          cat > "$work/secrets.env" <<'EOF'
          AGENT_KEY=d
          COALITION_KEY=d
          STRIPE_SECRET_KEY=d
          STRIPE_WEBHOOK_SECRET=d
          EOF
          run() { docker run --rm -v "$work:/work" -u "$(id -u):$(id -g)" mt-manifest:ci "$@"; }
          run keygen
          run sign --key manifest-key.pem --from-config config.env --out manifest.json

          if run env --from-config config.env --secrets secrets.env \
                     --manifest manifest.json --out env.json 2>"$work/err"; then
            echo "FAIL: malformed TIER_PRICES_JSON was accepted"; exit 1
          fi
          grep -q "TIER_PRICES_JSON is not valid JSON" "$work/err" \
            || { echo "FAIL: wrong error:"; cat "$work/err"; exit 1; }
          echo "malformed config rejected as expected"

          # A missing HOSTS must also fail at sign time, not silently produce an
          # unconstrained manifest.
          grep -v '^HOSTS=' "$work/config.env" > "$work/nohosts.env"
          if run sign --key manifest-key.pem --from-config nohosts.env --out x.json 2>"$work/err2"; then
            echo "FAIL: manifest signed with no HOSTS"; exit 1
          fi
          grep -q "HOSTS is required" "$work/err2" \
            || { echo "FAIL: wrong error:"; cat "$work/err2"; exit 1; }
          echo "missing HOSTS rejected as expected"
